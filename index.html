<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vice District Bar Exam</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #d8cfc0;
  color: #1a1a1a;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 1200px;
  margin: 20px auto;
  padding: 20px;
}

.timer-box {
  position: sticky;
  top: 0;
  z-index: 999;
  background: #162a44;
  color: white;
  padding: 15px 20px;
  border-bottom: 5px solid #8b1e1e;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#timer {
  font-size: 24px;
  font-weight: bold;
}

.warning {
  color: #ffd166;
}

.danger {
  color: #ff4d4d;
}

h1, h2 {
  color: #8b1e1e;
}

h2 {
  border-bottom: 2px solid #8b1e1e;
  padding-bottom: 5px;
}

.notice {
  background: #f4ede3;
  border-left: 6px solid #8b1e1e;
  padding: 15px 20px;
  border-radius: 8px;
  margin-bottom: 20px;
}

#questions {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.question {
  background: #f4ede3;
  border-radius: 10px;
  border: 1px solid #d2c6b4;
  overflow: hidden;
}

.question p {
  margin: 0;
  padding: 12px;
  background: #efe6d8;
  font-weight: bold;
  color: #5a1414;
}

.question label {
  display: block;
  padding: 10px 12px;
  border-top: 1px solid #ddd2c2;
  cursor: pointer;
}

.question label:hover {
  background: #e8ddcc;
}

input[type="radio"] {
  margin-right: 8px;
  accent-color: #8b1e1e;
}

input[type="text"] {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #cbbfae;
  background: #f4ede3;
  box-sizing: border-box;
}

button {
  padding: 12px 18px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  margin-top: 15px;
}

button[type="submit"] {
  background: #8b1e1e;
  color: white;
}

button[type="submit"]:hover {
  background: #6e1717;
}

#copyBtn {
  background: #f4ede3;
  border: 1px solid #cbbfae;
  margin-left: 8px;
}

#copyBtn:hover {
  background: #e8ddcc;
}

#scoreBox {
  margin-top: 20px;
  padding: 15px;
  background: #f4ede3;
  border-radius: 10px;
  border: 1px solid #d2c6b4;
  display: none;
}

.passed {
  color: green;
  font-weight: bold;
}

.failed {
  color: red;
  font-weight: bold;
}

#discordResult {
  width: 100%;
  height: 150px;
  margin-top: 15px;
  background: #f4ede3;
  border: 1px solid #cbbfae;
  border-radius: 8px;
  padding: 10px;
  display: none;
}

@media (max-width: 900px) {
  #questions {
    grid-template-columns: 1fr;
  }

  .timer-box {
    flex-direction: column;
    gap: 5px;
    text-align: center;
  }
}
</style>
</head>

<body>

<div class="timer-box">
  <div><strong>Vice District Bar Exam</strong></div>
  <div>Time Elapsed: <span id="timer">00:00</span></div>
  <div>Time Limit: 06:00</div>
</div>

<div class="container">
  <h1>Vice District Bar Exam</h1>
  <p>Passing Score: 80%</p>

  <div class="notice">
    You must score at least 80% and finish under 6 minutes. 
    If your time reaches 6 minutes or more, you automatically fail.
  </div>

  <form onsubmit="return submitQuiz();">

    <h2>Applicant Info</h2>

    <div class="question">
      <p>Character Name</p>
      <label>
        <input type="text" id="characterName" required>
      </label>
    </div>

    <h2>Questions</h2>

    <div id="questions"></div>

    <button type="submit" id="submitBtn">Submit Answers</button>

    <button type="button" id="copyBtn" onclick="copyResults()" style="display:none;">
      Copy Character Name & Results
    </button>

    <div id="scoreBox"></div>

    <textarea id="discordResult" readonly></textarea>

  </form>
</div>

<script>
const WEBHOOK_URL = "https://discord.com/api/webhooks/1504977885591506985/PsxXP0JFgFY904ME-K7WfHkgx768p7pCwIOTVEd2R2ESOhDCxEWOEERmWOQaaWg2wgI6";
const questions = [
  {
    q: "1. What is a Terry Stop?",
    a: ["A. A full arrest with charges", "B. A temporary detention based on reasonable suspicion", "C. A search warrant", "D. A traffic citation"],
    correct: "B"
  },
  {
    q: "2. Which is required for an arrest?",
    a: ["A. Reasonable suspicion", "B. Probable cause", "C. A warrant in all cases", "D. Officer intuition"],
    correct: "B"
  },
  {
    q: "3. What does probable cause mean?",
    a: ["A. A guess", "B. A reasonable belief a crime occurred", "C. A confession is required", "D. Evidence beyond doubt"],
    correct: "B"
  },
  {
    q: "4. If a suspect invokes their right to remain silent, officers must:",
    a: ["A. Continue questioning", "B. Threaten arrest", "C. Stop questioning", "D. Ignore it"],
    correct: "C"
  },
  {
    q: "5. What is the purpose of Miranda Rights?",
    a: ["A. To charge a suspect", "B. To inform suspects of their rights", "C. To search property", "D. To issue fines"],
    correct: "B"
  },
  {
    q: "6. What is considered an illegal search?",
    a: ["A. Search with consent", "B. Search with a warrant", "C. Search without probable cause or consent", "D. Inventory search while arrested."],
    correct: "C"
  },
  {
    q: "7. What is burden of proof in court?",
    a: ["A. Defendant proves innocence", "B. Police decide guilt", "C. Prosecution must prove guilt", "D. Judge investigates"],
    correct: "C"
  },
  {
    q: "8. What does beyond a reasonable doubt mean?",
    a: ["A. 100% certainty", "B. Strong evidence with no logical doubt", "C. Any suspicion", "D. Majority vote"],
    correct: "B"
  },
  {
    q: "9. What is hearsay?",
    a: ["A. Direct evidence", "B. Second-hand information", "C. Physical evidence", "D. Video proof"],
    correct: "B"
  },
  {
    q: "10. What is attorney-client privilege?",
    a: ["A. Lawyer reports everything", "B. Lawyer can share info publicly", "C. Communication is confidential", "D. Only applies in court"],
    correct: "C"
  },
  {
    q: "11. Leaving a known drug area alone justifies a stop?",
    a: ["A. Yes always", "B. No, not by itself", "C. Only at night", "D. Only with a warrant"],
    correct: "B"
  },
  {
    q: "12. No Miranda rights were read before a confession. What happens?",
    a: ["A. Always admissible", "B. Likely suppressed", "C. Automatically guilty", "D. Only used in civil court"],
    correct: "B"
  },
  {
    q: "13. Illegal search finds weapons. What happens?",
    a: ["A. Evidence always allowed", "B. Evidence likely suppressed", "C. Charges double", "D. Officer decides"],
    correct: "B"
  },
  {
    q: "14. A witness only “heard it happened.” This is:",
    a: ["A. Strong evidence", "B. Direct evidence", "C. Hearsay", "D. Physical proof"],
    correct: "C"
  },
  {
    q: "15. A suspect runs from a lawful stop. What does this allow?",
    a: ["A. Nothing changes", "B. Escalation is justified", "C. Case dismissed", "D. Must release suspect"],
    correct: "B"
  },
  {
    q: "16. Which is a felony?",
    a: ["A. Parking ticket", "B. Murder", "C. Jaywalking", "D. Speeding"],
    correct: "B"
  },
  {
    q: "17. Reasonable suspicion allows:",
    a: ["A. Arrest", "B. Temporary detention", "C. Conviction", "D. Jail time"],
    correct: "B"
  },
  {
    q: "18. Which is NOT a suspect right?",
    a: ["A. Right to remain silent", "B. Right to attorney", "C. Right to resist arrest", "D. Protection from unlawful search"],
    correct: "C"
  },
  {
    q: "19. A defense attorney’s role is to:",
    a: ["A. Prove guilt", "B. Protect client rights", "C. Work for police", "D. Decide sentencing"],
    correct: "B"
  },
  {
    q: "20. Police misconduct should be handled by:",
    a: ["A. Ignoring it", "B. Filing motions and challenging evidence", "C. Helping police", "D. Ending the case immediately"],
    correct: "B"
  }
];

const TIME_LIMIT_MS = 360000;
const startTime = Date.now();
let timerInterval;
let submitted = false;

function loadQuestions() {
  const box = document.getElementById("questions");

  questions.forEach((item, index) => {
    let html = `<div class="question"><p>${item.q}</p>`;

    item.a.forEach(answer => {
      const letter = answer.charAt(0);
      html += `
        <label>
          <input type="radio" name="Q${index + 1}" value="${letter}" required>
          ${answer}
        </label>
      `;
    });

    html += `</div>`;
    box.innerHTML += html;
  });
}

function formatTime(ms) {
  const totalSeconds = Math.floor(ms / 1000);
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;

  return String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
}

function updateTimer() {
  if (submitted) return;

  const elapsedMs = Date.now() - startTime;
  const timer = document.getElementById("timer");

  timer.textContent = formatTime(elapsedMs);

  if (elapsedMs >= 300000 && elapsedMs < TIME_LIMIT_MS) {
    timer.className = "warning";
  }

  if (elapsedMs >= TIME_LIMIT_MS) {
    timer.className = "danger";
  }
}

function submitQuiz() {
  submitted = true;
  clearInterval(timerInterval);

  let score = 0;
  const characterName = document.getElementById("characterName").value;

  const elapsedMs = Date.now() - startTime;
  const timeTaken = formatTime(elapsedMs);

  questions.forEach((item, index) => {
    const selected = document.querySelector(`input[name="Q${index + 1}"]:checked`);
    if (selected && selected.value === item.correct) {
      score++;
    }
  });

  const percent = Math.round((score / questions.length) * 100);

  let status = percent >= 80 ? "PASSED" : "FAILED";

  // ⛔ TIME LIMIT FAIL
  if (elapsedMs >= TIME_LIMIT_MS) {
    status = "FAILED - TIME LIMIT EXCEEDED";
  }

  const statusClass = status.includes("PASSED") ? "passed" : "failed";

  // 🧾 SHOW RESULTS ON PAGE
  document.getElementById("scoreBox").style.display = "block";
  document.getElementById("scoreBox").innerHTML = `
    <h2>Results</h2>
    <p><strong>Character:</strong> ${characterName}</p>
    <p><strong>Score:</strong> ${score}/${questions.length} - ${percent}%</p>
    <p><strong>Status:</strong> <span class="${statusClass}">${status}</span></p>
    <p><strong>Time Taken:</strong> ${timeTaken}</p>
  `;

  // 📋 DISCORD COPY TEXT
  const discordText =
`**━━━━━━━━━━━━━━━━━━━━**
**⚖️ VICE DISTRICT BAR EXAM RESULTS**
**━━━━━━━━━━━━━━━━━━━━**

**Character Name:** ${characterName}
**Score:** ${score}/${questions.length}
**Percentage:** ${percent}%
**Status:** ${status}
**Time Taken:** ${timeTaken}

**Result:** ${
  status.includes("FAILED")
    ? "❌ Retake Required"
    : "✅ Licensed Attorney Eligible"
}

**━━━━━━━━━━━━━━━━━━━━**`;

  document.getElementById("discordResult").style.display = "block";
  document.getElementById("discordResult").value = discordText;

  document.getElementById("copyBtn").style.display = "inline-block";

  // 🔥 SEND RESULTS TO DISCORD (WEBHOOK)
  fetch(WEBHOOK_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      embeds: [{
        title: "⚖️ Vice District Bar Exam Result",
        color: status.includes("PASSED") ? 3066993 : 15158332,
        fields: [
          { name: "Character", value: characterName, inline: true },
          { name: "Score", value: `${score}/${questions.length} (${percent}%)`, inline: true },
          { name: "Status", value: status, inline: true },
          { name: "Time Taken", value: timeTaken, inline: true }
        ],
        footer: {
          text: "Vice District RP"
        },
        timestamp: new Date().toISOString()
      }]
    })
  }).catch(err => console.error("Webhook error:", err));

  return false;
}

function copyResults() {
  const resultBox = document.getElementById("discordResult");

  navigator.clipboard.writeText(resultBox.value).then(() => {
    alert("Results copied! Paste it into Discord.");
  });
}

loadQuestions();
timerInterval = setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
